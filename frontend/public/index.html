<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetMatric — LeetCode Stats Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient Background -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page-wrapper">

    <!-- ── HEADER ── -->
    <header class="site-header">
      <div class="logo-group">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="11" height="11" rx="3" fill="#7c6aff"/>
            <rect x="15" y="2" width="11" height="11" rx="3" fill="#7c6aff" opacity=".5"/>
            <rect x="2" y="15" width="11" height="11" rx="3" fill="#7c6aff" opacity=".5"/>
            <rect x="15" y="15" width="11" height="11" rx="3" fill="#7c6aff" opacity=".25"/>
          </svg>
        </div>
        <span class="logo-text">LeetMatric</span>
      </div>
      <a href="https://leetcode.com" target="_blank" rel="noopener" class="header-link">leetcode.com ↗</a>
    </header>

    <!-- ── HERO SEARCH ── -->
    <section class="hero">
      <div class="hero-tag">// progress tracker</div>
      <h1 class="hero-title">Visualize your<br/><em>LeetCode journey</em></h1>
      <p class="hero-sub">Enter a username to see solved problems, streaks, submissions & more.</p>

      <div class="search-card">
        <div class="search-inner">
          <div class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </div>
          <input type="text" id="user-input" placeholder="e.g. neal_wu" autocomplete="off" spellcheck="false" maxlength="25" />
          <button id="search-btn">
            <span class="btn-text">Search</span>
            <span class="btn-spinner" hidden>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
            </span>
          </button>
        </div>
        <div class="search-hint" id="search-hint"></div>
      </div>
    </section>

    <!-- ── RESULTS ── -->
    <main class="results" id="results" aria-live="polite"></main>

  </div><!-- /page-wrapper -->

  <script src="app.js"></script>
</body>
</html>
